name: weather_app_biometrics
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  local_auth: ^3.0.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_riverpod: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/weather.png
  windows:
    generate: true
    image_path: assets/weather.png
    icon_size: 50

flutter:
  uses-material-design: true
  assets:
    - assets/weather.png